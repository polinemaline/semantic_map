{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
<section class="auth-page">
  <section class="auth-card glass-panel auth-card-minimal">
    <h1>Вход</h1>

    <form class="form auth-form" method="post">
      <div class="form-group">
        <label for="login">Логин</label>
        <input
          id="login"
          type="text"
          name="login"
          value="{{ login_value }}"
          autocomplete="username"
          required
        >
      </div>

      <div class="form-group">
        <label for="password">Пароль</label>
        <div class="password-input-wrap">
          <input
            id="password"
            type="password"
            name="password"
            autocomplete="current-password"
            required
          >
          <button
            class="password-eye-button"
            type="button"
            data-password-toggle="password"
            aria-label="Показать пароль"
          >👁</button>
        </div>
      </div>

      <button class="button auth-submit auth-submit-primary" type="submit">Войти</button>

      <div class="auth-switch-row">
        Нет аккаунта?
        <a href="{{ url_for('main.register') }}">Зарегистрироваться</a>
      </div>
    </form>
  </section>
</section>
{% endblock %}
