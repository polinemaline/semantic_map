{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="auth-card glass-panel auth-card-minimal">
        <h1>Вход</h1>

        <form method="post" class="form auth-form">
            <div class="form-group">
                <label for="login">Логин</label>
                <input
                    id="login"
                    name="login"
                    type="text"
                    value="{{ login_value }}"
                    placeholder="Введите логин или email"
                    required
                    autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <input
                    id="password"
                    name="password"
                    type="password"
                    placeholder="Введите пароль"
                    required
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" class="button auth-submit auth-submit-primary">
                Войти
            </button>

            <div class="auth-switch-row">
                <span>Нет аккаунта?</span>
                <a href="{{ url_for('main.register') }}">Зарегистрироваться</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
