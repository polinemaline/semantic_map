{% extends "base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="auth-card glass-panel auth-card-minimal">
        <h1>Регистрация</h1>

        <form method="post" class="form auth-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input
                    id="email"
                    name="email"
                    type="email"
                    value="{{ email_value }}"
                    placeholder="Введите email"
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <input
                    id="password"
                    name="password"
                    type="password"
                    placeholder="Введите пароль"
                    required
                    autocomplete="new-password"
                >
            </div>

            <div class="form-group">
                <label for="password_repeat">Повторите пароль</label>
                <input
                    id="password_repeat"
                    name="password_repeat"
                    type="password"
                    placeholder="Повторите пароль"
                    required
                    autocomplete="new-password"
                >
            </div>

            <button type="submit" class="button auth-submit auth-submit-primary">
                Зарегистрироваться
            </button>

            <div class="auth-switch-row">
                <span>Есть аккаунт?</span>
                <a href="{{ url_for('main.login') }}">Войти</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
