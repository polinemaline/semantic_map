{% extends "base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<section class="auth-page">
  <section class="auth-card glass-panel auth-card-minimal">
    <h1>Регистрация</h1>

    <form class="form auth-form" method="post">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          name="email"
          value="{{ email_value }}"
          autocomplete="email"
          required
        >
      </div>

      <div class="form-group">
        <label for="password">Пароль</label>
        <div class="password-input-wrap">
          <input
            id="password"
            type="password"
            name="password"
            autocomplete="new-password"
            minlength="6"
            required
          >
          <button
            class="password-eye-button"
            type="button"
            data-password-toggle="password"
            aria-label="Показать пароль"
          >👁</button>
        </div>
      </div>

      <div class="form-group">
        <label for="password_repeat">Повторите пароль</label>
        <div class="password-input-wrap">
          <input
            id="password_repeat"
            type="password"
            name="password_repeat"
            autocomplete="new-password"
            minlength="6"
            required
          >
          <button
            class="password-eye-button"
            type="button"
            data-password-toggle="password_repeat"
            aria-label="Показать пароль"
          >👁</button>
        </div>
      </div>

      <button class="button auth-submit auth-submit-primary" type="submit">Зарегистрироваться</button>

      <div class="auth-switch-row">
        Есть аккаунт?
        <a href="{{ url_for('main.login') }}">Войти</a>
      </div>
    </form>
  </section>
</section>
{% endblock %}
